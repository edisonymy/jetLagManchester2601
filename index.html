<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manchester B4B</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --sf-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --bg-primary: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent: #0a84ff;
            --graphene: #0a84ff;
            --vimto: #ff375f;
            --program: #30d158;
            --neutral: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            --glass: rgba(28, 28, 30, 0.85);
        }

        body {
            font-family: var(--sf-font);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Common Panel Styles */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.2px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .panel-section {
            padding: 16px;
        }

        /* Dashboard (Persistent: Scoreboard + Log) */
        .dashboard {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            z-index: 1000;
            max-height: calc(100vh - 40px);
            /* Full height minus margins */
            display: flex;
            flex-direction: column;
        }

        /* Action Panel (Hideable - Moves to Left) */
        .action-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            /* Moved to Left */
            width: 300px;
            z-index: 1000;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .action-panel.hidden {
            transform: translateX(-340px);
            /* Slide out to Left */
            opacity: 0;
            pointer-events: none;
        }

        /* Close/Toggle Buttons */
        .close-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-tertiary);
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .toggle-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            /* Aligned with Action Panel */
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            background: rgba(58, 58, 60, 0.9);
        }

        .toggle-btn.hidden {
            pointer-events: none;
            opacity: 0;
        }

        /* Scoreboard */
        .scoreboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .team-row {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        .team-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .team-indicator.graphene {
            background: var(--graphene);
        }

        .team-indicator.vimto {
            background: var(--vimto);
        }

        .team-indicator.program {
            background: var(--program);
        }

        .team-name {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
        }

        .team-stats {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .stat {
            text-align: right;
            min-width: 40px;
        }

        .stat-value {
            font-weight: 600;
            display: block;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
        }

        /* Controls */
        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .control-group {
            flex: 1;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        select {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: var(--sf-font);
            font-size: 14px;
            appearance: none;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-family: var(--sf-font);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #0070e0;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: var(--vimto);
            color: white;
        }

        .btn-danger:hover {
            background: #e02050;
        }

        /* Event Log */
        .event-log {
            flex: 1;
            /* Take remaining space */
            min-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            border-top: 1px solid var(--border);
        }

        .event-log::-webkit-scrollbar {
            width: 4px;
        }

        .event-log::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 2px;
        }

        .event-item {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .event-time {
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            min-width: 35px;
        }

        .event-text {
            flex: 1;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 20px;
            /* Moved to Top Left */
            left: 20px;
            padding: 12px 16px;
            z-index: 1000;
        }

        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .legend-contested {
            background: repeating-linear-gradient(45deg,
                    var(--graphene),
                    var(--graphene) 3px,
                    var(--vimto) 3px,
                    var(--vimto) 6px);
            border: 2px solid var(--vimto);
            box-shadow: 0 0 6px rgba(255, 204, 0, 0.6);
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
            z-index: 1000;
        }

        .leaflet-container {
            background: var(--bg-primary);
        }

        /* Contested Polygon Animation - HIGHLY VISIBLE */
        .contested-polygon {
            filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.9)) drop-shadow(0 0 50px rgba(255, 100, 0, 0.6));
        }

        .contested-polygon path {
            animation: contested-pulse 0.6s ease-in-out infinite;
        }

        @keyframes contested-pulse {

            0%,
            100% {
                stroke-opacity: 1;
                filter: drop-shadow(0 0 20px rgba(255, 204, 0, 1));
            }

            50% {
                stroke-opacity: 0.6;
                filter: drop-shadow(0 0 40px rgba(255, 100, 0, 1));
            }
        }

        /* Lock button styling */
        .btn-lock {
            background: linear-gradient(135deg, #f5a623, #f78c40);
            color: white;
        }

        .btn-lock:hover {
            background: linear-gradient(135deg, #e09520, #e07030);
        }

        /* Enhanced Postcode Label styling */
        .postcode-label {
            font-size: 11px;
            font-weight: 700;
            font-family: var(--sf-font);
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
            text-align: center;
            pointer-events: none;
        }

        .postcode-label.contested {
            color: #ffcc00;
            text-shadow: 0 0 8px rgba(255, 204, 0, 0.8);
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <!-- Toggle Button for Actions -->
    <button class="toggle-btn glass-panel hidden" id="toggleBtn" onclick="toggleActions()">☰</button>

    <!-- Dashboard (Always Visible) -->
    <div class="dashboard glass-panel">
        <div class="panel-header">
            <span class="panel-title">Scoreboard</span>
        </div>
        <div class="panel-section">
            <div class="scoreboard">
                <div class="team-row">
                    <div class="team-indicator graphene"></div>
                    <span class="team-name">Graphene</span>
                    <div class="team-stats">
                        <div class="stat">
                            <div class="stat-value" id="graphene-claims">0</div>
                            <div class="stat-label">Claims</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="graphene-points">0</div>
                            <div class="stat-label">Points</div>
                        </div>
                    </div>
                </div>
                <div class="team-row">
                    <div class="team-indicator vimto"></div>
                    <span class="team-name">Vimto</span>
                    <div class="team-stats">
                        <div class="stat">
                            <div class="stat-value" id="vimto-claims">0</div>
                            <div class="stat-label">Claims</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="vimto-points">0</div>
                            <div class="stat-label">Points</div>
                        </div>
                    </div>
                </div>
                <div class="team-row">
                    <div class="team-indicator program"></div>
                    <span class="team-name">Program</span>
                    <div class="team-stats">
                        <div class="stat">
                            <div class="stat-value" id="program-claims">0</div>
                            <div class="stat-label">Claims</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="program-points">0</div>
                            <div class="stat-label">Points</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="panel-header" style="border-top: 1px solid var(--border);">
            <span class="panel-title">History</span>
        </div>
        <div class="event-log" id="event-log">
            <div class="event-item" style="color: var(--text-secondary); font-style: italic;">No events yet</div>
        </div>
    </div>

    <!-- Action Panel (Hideable) -->
    <div class="action-panel glass-panel" id="actionPanel">
        <div class="panel-header">
            <span class="panel-title">Actions</span>
            <button class="close-btn" onclick="toggleActions()">×</button>
        </div>
        <div class="panel-section">
            <div class="control-row">
                <div class="control-group">
                    <label>Team</label>
                    <select id="team-select">
                        <option value="graphene">Graphene</option>
                        <option value="vimto">Vimto</option>
                        <option value="program">Program</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Postcode</label>
                    <select id="postcode-select">
                        <option value="">Select...</option>
                    </select>
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="claimPostcode()">Claim</button>
                <button class="btn btn-lock" onclick="lockPostcode()">Lock</button>
                <button class="btn btn-secondary" onclick="undoLastAction()">Undo</button>
            </div>
            <div class="btn-row" style="margin-top: 8px;">
                <button class="btn btn-danger" onclick="resetGame()">Reset</button>
            </div>
        </div>
    </div>

    <!-- Legend (Top Left) -->
    <div class="legend blur-panel">
        <div class="legend-item">
            <div class="legend-color" style="background-color: #0a84ff;"></div>
            <span>Graphene</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #ff375f;"></div>
            <span>Vimto</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background-color: #30d158;"></div>
            <span>Program</span>
        </div>
        <div class="legend-item">
            <div class="legend-color status-locked"></div>
            <span>Locked (Solid + 🔒)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color status-claimed" style="background-color: #888; opacity: 0.4;"></div>
            <span>Claimed (Light)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color legend-contested"></div>
            <span>Contested (⚔️ + Dashed)</span>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="status-bar">Ready</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="postcodes.js"></script>
    <script src="app.js"></script>
</body>

</html>
